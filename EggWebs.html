<!DOCTYPE html>
<html lang="en">
<head>
    <title>EggWebs</title>
    <style>
        * {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        .settingcontainer {
            background-color:cornflowerblue;
            margin-top:7px;
        }
        p {
            margin:0;
        }
        html, body {
            margin:0;
            height:100%;
        }
        #sidebar {
            float:right;
            width:25%;
            height:100%;
            background-color:royalblue;
            overflow:overlay;
        }
        #mainview {
            float:left;
            width:75%;
            height:100%;
            text-align:center;
        }
        .pokemonbox {
            display:inline-block;
            text-align:center;
            vertical-align:top;
            position:relative;
        }
        .egggroupicon {
            position:absolute;
            width:42px;
            height:42px;
        }
        .chainarrow {
            top:42px;
            display:inline-block;
            position:relative;
            font-size:42px;
        }
        .dittoicon {
            position:absolute;
            width:42px;
            height:42px;
        }
        .optionbox {
            position:absolute;
            top:42px;
            border:1px black solid;
        }
        .optionlisting {
            background-color:white;
        }
        .optionlisting:hover {
            background-color:lightgray;
        }
        .chainbox {
            margin:30px;
        }
        .imagecontainer {
            width:128px;
            height:128px;
            margin:0 auto;
            left:0;
            right:0;
            position:inherit;
        }
    </style>
</head>
<body>
<div id="mainview"></div>
<div id="sidebar">
    <button type="button" onclick="main()">Go</button>
    <div class="settingcontainer">
        <input type="file" id="input" multiple />
    </div>
    <div class="settingcontainer">
        <span id="gamelistspan1">Target game:</span>
    </div>
    <div class="settingcontainer">
        <span id="gamelistspan2">Usable games:</span>
        <button type="button" onclick="SelectAllGames()" id="allgamesbutton">All Applicable Games</button>
        <button type="button" onclick="SelectOnlyTargetGame()" id="selecttargetbutton">Only Target Game</button>
    </div>
    <div class="settingcontainer">
        <textarea id="targetspecies" rows="1" cols="30"></textarea><label for="targetspecies">Target Species</label>
    </div>
    <div class="settingcontainer">
        <input type="checkbox" id="nomoves" onclick="ToggleMoveSettings()"/><label for="nomoves">No Moves (use for things like passing natures)</label>
    </div>
    <div id="movesettings">
        <div class="settingcontainer">
            <p class="settingstext">Check the boxes for each method of learning a move that you don't want parents to use.</p>
            <input type="checkbox" id="levelup1"/><label for="levelup1">Level up</label>
            <br>
            <input type="checkbox" id="tm1"/><label for="tm1">TM</label>
            <br>
            <input type="checkbox" id="universaltm1"/><label for="universaltm1">Universal TM</label>
            <br>
            <input type="checkbox" id="special1"/><label for="special1">Special (eg pokewalker)</label>
            <br>
            <input type="checkbox" id="event1"/><label for="event1">Event</label>
            <br>
            <input type="checkbox" id="tutor1"/><label for="tutor1">Tutor</label>
        </div>
        <div class="settingcontainer">
            <input type="number" id="maxlevel" value="100"/><label for="maxlevel">Max Level</label>
        </div>
    </div>
    <div class="settingcontainer">
        <p class="settingstext">Comma-separated list of Pokemon who are allowed to be the top-level ancestor.</p>
        <textarea id="requirefathers" rows="1" cols="30"></textarea><label for="requirefathers"></label>
    </div>
    <div class="settingcontainer">
        <input type="number" id="maxdepth" value="20"/><label for="maxdepth">Max Chain Length</label>
    </div>
    <div class="settingcontainer">
        <span id="combomodespan"><input type="checkbox" id="combomode"/><label for="combomode">Combo Mode (fit all moves on the Pokemon at the same time, generally not needed Gen 6+)</label></span>
    </div>
    <div class="settingcontainer">
        <input type="checkbox" id="slowmode"/><label for="slowmode">Slow Mode (walk through every step at your own pace)</label>
    </div>
</div>
<script src="js/core.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_bdsp.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_gen1.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_gen2.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_gen3.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_gen4.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_gen5.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_gen6.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_gen7.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_gen8.js" type="text/javascript" charset="utf-8"></script>
<script src="js/data_gen9.js" type="text/javascript" charset="utf-8"></script>
<script src="js/EggWebs.js" type="text/javascript" charset="utf-8"></script>
</body>
</html>
